# voice-vault configuration.
# Copy this file to `config.toml` next to it and edit the paths.
# Relative control-file paths resolve against this config file's directory.

[paths]
# ONE folder the app reads audio from. Treated read-only (never written to).
# Point Obsidian's mobile recorder attachment location here.
audio_src = "/absolute/path/to/Vault/_voice-inbox"

# Everything the app writes lives under here (notes, transcripts, archive, system state).
# STRICT SEPARATION: the app writes ONLY inside this folder and never touches user-authored
# vault space. Default to a dedicated subfolder of the vault named `dah`.
output_dir = "/absolute/path/to/Vault/dah"

# OPTIONAL read-only folder of existing notes to link into (e.g. your whole vault).
# The app reads this only to resolve [[wikilinks]] to your existing notes — never writes here.
# output_dir may live inside it (the indexer skips output_dir). Omit to run fully decoupled.
# link_context_dir = "/absolute/path/to/Vault"

# User-owned control files (the heart of "I steer it").
dictionary      = "config/dictionary.md"
taxonomy        = "config/taxonomy.md"
synthesis_guide = "config/synthesis-guide.md"
feedback        = "config/feedback.md"
tags            = "config/tags.md"
examples_dir    = "config/examples"

[transcribe]
model        = "distil-large-v3"  # English-only, near-large-v3 accuracy, fast. Or "large-v3".
audio_glob   = "*.m4a"            # Obsidian's default recording format.
language     = "en"
device       = "auto"             # auto | cpu | cuda
compute_type = "default"          # default | int8 | float16 | ...
vad          = true               # voice-activity detection trims silence

[synthesis]
backend        = "claude"         # claude | ollama | claude_code
model          = "claude-opus-4-8"  # for ollama, an Ollama model name, e.g. "qwen2.5:32b-instruct"
note_lifecycle = "evergreen"      # evergreen (merge-with-preserve) | append
splitting      = "by_concept"     # by_concept | single
ollama_host    = "http://localhost:11434"  # only used when backend = "ollama"

# claude_code: run synthesis through the Claude Code CLI (`claude -p ...`, headless mode)
# instead of the Messages API. This lets a Claude Pro/Max *subscription* power synthesis --
# a Pro/Max plan does NOT grant Messages API access (that's billed separately, pay-as-you-go),
# but the CLI can authenticate with the subscription via `claude login` and run non-interactively.
# Only used when backend = "claude_code".
# claude_code_bin   = "claude"          # path to the CLI binary, if not on PATH
# claude_code_model = "claude-opus-4-8" # optional --model override; unset uses the CLI's default

# --- cost management (all opt-in; leave unset to keep today's behavior unchanged) ---
# Model routing: route short/simple transcripts to a cheap model, longer ones to a strong one.
# Both cheap_model and strong_model must be set to enable routing.
# cheap_model  = "claude-haiku-4-5"
# strong_model = "claude-opus-4-8"
# routing_threshold_chars = 2000   # transcripts at/under this length use cheap_model

# Budget cap + kill-switch: stop starting new work once this many tokens (input + output,
# summed across the run) have been spent. The note/transcript in flight always finishes;
# everything after that is recorded as skipped rather than processed.
# budget_max_tokens = 200000

# Skip-unchanged: fingerprint (transcript + control files) and skip re-synthesis when nothing
# relevant has changed since the last run. Especially useful for `resynth` after an unrelated
# control-file edit.
# skip_unchanged = true

[git]
commit_each_run = true            # one commit per run in output_dir = audit trail
include_audio   = false           # true -> also commit raw audio blobs (consider git-lfs)

# --- watch mode (R2-T3): `python -m voicevault watch` -----------------------------------
# Polls audio_src for new/modified files (stdlib only -- no always-on dependency) and, once a
# file has been stable for poll_interval_seconds, invokes the normal `run` path on it.
[watch]
poll_interval_seconds  = 2.0      # how often to scan for changes
debounce_seconds       = 3.0      # quiet period a changed path must have before it's actioned
watch_control_files    = false    # true -> also watch config/*.md and `resynth` on edit
use_watchdog           = false    # true -> use the optional `watchdog` package (lazy import)
                                   # for event-driven notification instead of polling stat()
